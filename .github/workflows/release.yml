name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          SHA=$(curl -sL "https://github.com/jlkendrick/janus/archive/refs/tags/${VERSION}.tar.gz" | shasum -a 256 | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jlkendrick/homebrew-grimoire.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/grimoire.rb << EOF
          class Grimoire < Formula
            desc "A declarative, language-agnostic execution framework"
            homepage "https://jlkendrick.github.io/janus"
            url "https://github.com/jlkendrick/janus/archive/refs/tags/${VERSION}.tar.gz"
            sha256 "${SHA}"
            license "MIT"

            depends_on "go" => :build

            def install
              system "go", "build", *std_go_args(ldflags: "-s -w"), "."
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/grimoire --version")
            end
          end
          EOF

          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/grimoire.rb
          git commit -m "grimoire ${VERSION}"
          git push
