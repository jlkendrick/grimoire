version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: grimoire
    binary: grimoire
    main: .
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: grimoire
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: grimoire
    repository:
      owner: jlkendrick
      name: homebrew-grimoire
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://jlkendrick.github.io/janus"
    description: "A declarative, language-agnostic execution framework. Write pure functions, describe them in spell.yaml, get a fully typed CLI."
    license: "MIT"
