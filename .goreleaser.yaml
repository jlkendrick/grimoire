version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: grimoire
    binary: grimoire
    main: .
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: grimoire
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
